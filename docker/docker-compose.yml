version: "3.8"

services:
  db2:
    image: icr.io/db2_community/db2:11.5.9.0
    container_name: db2-wire-test
    privileged: true
    ports:
      - "50000:50000"
    environment:
      LICENSE: accept
      DB2INST1_PASSWORD: db2wire_test_pw
      DBNAME: testdb
      ARCHIVE_LOGS: "false"
      AUTOCONFIG: "false"
    volumes:
      - db2data:/database
      - ./seed:/seed:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "su - db2inst1 -c 'db2 connect to testdb' > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  db2data:
    driver: local
