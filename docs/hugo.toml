baseURL = "https://gurungabit.github.io/db2driver-node/"
languageCode = "en-us"
title = "db2-wire"
theme = "db2-wire-theme"

enableRobotsTXT = true
enableGitInfo = true

[params]
  description = "A zero-dependency DB2 driver for Node.js, built with pure Rust via napi-rs"
  github_repo = "https://github.com/gurungabit/db2driver-node"
  github_branch = "main"
  tagline = "Pure Rust DRDA wire protocol. Zero native dependencies. Lightning fast."

[params.social]
  github = "https://github.com/gurungabit/db2driver-node"

[menu]
  [[menu.main]]
    name = "Getting Started"
    url = "/getting-started/"
    weight = 10
  [[menu.main]]
    name = "Architecture"
    url = "/architecture/"
    weight = 20
  [[menu.main]]
    name = "API Reference"
    url = "/api-reference/"
    weight = 30
  [[menu.main]]
    name = "Protocol"
    url = "/protocol/"
    weight = 40
  [[menu.main]]
    name = "Contributing"
    url = "/contributing/"
    weight = 50

[markup]
  [markup.highlight]
    style = "github-dark"
    lineNos = false
    guessSyntax = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML"]
