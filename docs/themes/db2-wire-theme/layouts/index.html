{{ define "main" }}
<div class="hero">
  <h1>{{ .Site.Title }}</h1>
  <p class="tagline">{{ .Site.Params.tagline }}</p>
  <div class="hero-actions">
    <a href="{{ "getting-started/" | relURL }}" class="btn btn-primary">Get Started</a>
    <a href="{{ .Site.Params.github_repo }}" class="btn btn-secondary" target="_blank">GitHub</a>
  </div>
</div>
<article class="content home-content">
  {{ .Content }}
</article>
{{ end }}
