<header class="site-header">
  <nav class="navbar">
    <a href="{{ "/" | relURL }}" class="nav-brand">{{ .Site.Title }}</a>
    <ul class="nav-links">
      {{ range .Site.Menus.main }}
      <li><a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a></li>
      {{ end }}
      <li><a href="{{ .Site.Params.github_repo }}" target="_blank">GitHub</a></li>
    </ul>
  </nav>
</header>
